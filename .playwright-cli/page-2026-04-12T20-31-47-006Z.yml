          - heading "Brad Sherman" [level=2] [ref=e23]
          - paragraph [ref=e24]: I'm a graphic designer and illustrator based in Madison, WI, graduating from the University of Wisconsin-Madison. My work spans branding, campaign design, editorial layout, poster and print design, and social media — with a strong foundation in illustration that runs through everything I make.
          - paragraph [ref=e25]: I studied abroad at SRISA in Florence, Italy, where I developed work exploring Italian typography, currency design, and visual culture. Back at UW-Madison, I served as the sole graphic designer for the IceCube Neutrino Observatory (WIPAC), creating all visual communications across social, print, and digital. I also interned at Saatchi & Saatchi Wellness as an art director on a public health campaign.
          - paragraph [ref=e26]: I'm drawn to projects that require both visual craft and strategic thinking — building brand systems, designing multi-platform campaigns, and creating work that communicates clearly at every scale. I'm looking for opportunities at agencies and studios where I can bring this range to real-world branding and design challenges.
