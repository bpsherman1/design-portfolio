            - generic [ref=e91]: Rebranding Naples 15
            - generic [ref=e92]: "2025"
            - generic [ref=e93]: UW-Madison
            - generic [ref=e94]: Background
            - generic [ref=e96]: Naples 15 is an Italian restaurant in Madison, WI, founded by two native Neapolitans, Antonio Cotoia and Raffaele Lo Manto, who brought their family's pizza-making heritage to Wisconsin. The name itself, "Naples 15," is a direct reference to their affiliation with the Associazione Verace Pizza Napoletana (A VPN), the strict governing body in Naples that certifies authentic Neapolitan pizza, and they were reportedly the 15th pizzeria in the United States to receive this prestigious certification. The brand's story is, therefore, built on authenticity, tradition, and a direct transatlantic connection to the very birthplace of pizza.
          - img [ref=e99]
          - generic [ref=e101]:
            - generic [ref=e102]: Objective
            - generic [ref=e103]: The main challenge with the logo is that it isn't memorable, and doesn't effectively represent their business. The objective of the project was to capture Naples 15’s authentic Italian aesthetic, and create a new visual identity with a clean and elegant logo. Their current logo is a light representation of Mt. Vesuvius, with the wordmark "Naples 15" below. The logo lacks connection to food, or pizza, which is their specialty. I wanted to create a logo that both represents Naples and pizza, but also feels authentic, as this will help make Naples 15 stand out as a more trustworthy and high quality restaurant.
          - generic [ref=e106]: 3 Style Explorations
