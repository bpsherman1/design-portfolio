            - generic [ref=e120]: Final Logo Design
            - generic [ref=e121]: The logo is composed of a circular pizza icon representing the food and culture of Naples. Pizza slices emerge from the light and dark reds at the top of the pizza. In the bottom half, two blue slices outline Mt. Vesuvius. The use of blue refers to both the Gulf of Naples and Naples' soccer team, the Azzurri, turning the pizza into a symbol of local pride. The top-left slice acts as the eruption, giving the design energy.
          - generic [ref=e123]:
            - img [ref=e127]
            - generic [ref=e131]: The logo seeks to merge food with location and heritage. The pizza is an icon and is easily identifiable, while the volcano registers as an index, a direct symbol of Naples. The logos' red tones connect to tomato and pizza, while the blues evoke tradition and culture. The design seems simple at first, but is layered with representation giving an impression of authenticity and quality.
