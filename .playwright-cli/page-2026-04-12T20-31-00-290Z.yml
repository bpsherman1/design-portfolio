        - img "Architecture in Madison — Map" [ref=e41] [cursor=pointer]
        - generic [ref=e42]:
          - img "Architecture in Madison — Castle Illustration" [ref=e43] [cursor=pointer]
          - paragraph [ref=e45]: For this project, we had to design a map calling out destinations around Madison. I decided to map out my favorite architecture across the city. We had to use Destination Madison's logo, colors, and typography while picking a unique theme. The map itself resembles a blueprint design, and each building's layout is then highlighted. I used a variety of different architectural styles, such as brutalist, organic, and different Italian revivals.
      - generic [ref=e47]:
        - generic [ref=e48]:
          - generic [ref=e49]:
            - heading "The New Yorker Slideshow" [level=2] [ref=e50]
            - paragraph [ref=e51]: 2025 — UW-Madison
            - paragraph [ref=e52]: "For this project, we had to design a 10 page slideshow representing 10 different movies. I chose to focus on intense violent movies and split the project into 3 sections: boxing, mafia, and war. To ensure each section was unique, I developed separate designs for each, then blended and combined them to create a cohesive overall look through the slideshow. The design guidelines required me to approach the project as if I were working for The New Yorker. To accomplish this, I used their signature fonts, color palette, and illustrative cover style."
          - img "The New Yorker Slideshow — Car" [ref=e53] [cursor=pointer]
        - img "The New Yorker Slideshow — Full Panorama" [ref=e54] [cursor=pointer]
