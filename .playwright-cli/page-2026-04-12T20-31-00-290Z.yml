          - paragraph [ref=e63]: 2025 — UW-Madison
          - paragraph [ref=e64]: The goal of this project was to visually represent data regarding Olympic medalists who attended the University of Wisconsin-Madison. To organize the information meaningfully, I chose to categorize the medalists based on the campus locations where their respective sports are played. I mapped each of the campus buildings and a chronological timeline connecting back to each sport.
