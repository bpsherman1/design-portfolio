          - paragraph [ref=e70]: 2025 — SRISA (Study Abroad, Florence)
          - paragraph [ref=e71]: This project challenged us to redesign three Italian Lira bills. We had to keep the iconography and copy, but had to redesign them in a modern way. Drawing inspiration from traditional Italian tile patterns, I designed a cohesive series featuring both the front and back designs for each of the three bills.
