          - paragraph [ref=e86]: I didn't know where to start with this project, as I usually make illustrations, but I decided to work with photography. I thought an illustration wouldn't be able to represent this original cover. I found a photo I had taken, messed with it in Photoshop, and designed the text. Then I wanted to make the image go from the cover to the back, which looked really cool on the final printed sleeve.
