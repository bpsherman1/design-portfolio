              - generic [ref=e106]: "For this project, we had to design a 10-page slideshow representing 10 different movies. I chose to focus on intense movies and split the project into 3 sections: boxing, mafia, and war. To ensure each section was unique, I developed separate designs for each, then blended and combined them to create a cohesive overall look through the slideshow."
